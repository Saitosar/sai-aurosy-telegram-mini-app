services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sai-aurosy-api
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - aurosy-network
      - talaix-network

networks:
  aurosy-network:
    driver: bridge
  talaix-network:
    external: true
    name: hrtech-talaix_talaix-network
