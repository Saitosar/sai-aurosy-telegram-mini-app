name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 91.98.72.220
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/sai-aurosy
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
